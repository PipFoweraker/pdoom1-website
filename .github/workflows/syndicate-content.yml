name: Content Syndication

# INBOUND AUTOMATED, OUTBOUND HUMAN-GATED.
#
# Syncing content INTO the site is automatic. Publishing words OUT into the
# world is a decision a person makes. This workflow therefore has two halves
# that never run together:
#
#   PREPARE (automatic, when a post is published)
#     Drafts per-platform copy into content/syndication/<slug>.json and commits
#     it. Posts NOTHING. The draft carries "approved": false.
#
#   PUBLISH (manual dispatch only, and defaults to a dry run)
#     Posts EXACTLY the copy in the file, and only for drafts a human has set
#     "approved": true on. Writes posted_at back so nothing goes out twice.
#
# Because the draft is a committed file, git history is the audit trail of what
# went out, when, and who approved it.
#
# What the previous version did, for the record: it posted automatically on push
# to main, and re-implemented the copy formatting inline in bash rather than
# calling scripts/syndication-helpers.js -- so two divergent formatters existed
# and the bash one, which leaked its own YAML indentation into the post body,
# was the one that would have run. It also had no auth on the endpoints it
# called. All three are gone.

on:
  push:
    branches: [main]
    paths:
      - 'public/blog/index.json'

  workflow_dispatch:
    inputs:
      publish:
        description: 'Actually post approved drafts (leave false for a dry run)'
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: syndicate-content
  cancel-in-progress: false   # never interrupt a run that may be mid-post

jobs:
  prepare:
    name: Draft copy for review
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Draft copy for the latest post
        run: python scripts/prepare-syndication.py --latest

      - name: Commit the draft
        run: |
          set -euo pipefail
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          # Stage before testing: a new draft is untracked, and `git diff`
          # alone cannot see untracked files.
          git add -A content/syndication
          if git diff --cached --quiet -- content/syndication; then
            echo "No new draft to commit"
          else
            git commit -m "chore(syndication): draft copy for review (not posted)"
            git push
          fi

      - name: Explain what happens next
        run: |
          echo "::notice::Draft written to content/syndication/. NOTHING was posted."
          echo "::notice::Edit the copy, set approved to true, commit, then run this workflow manually with publish=true."

  publish:
    name: Post approved drafts
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Post approved drafts
        env:
          # SYNDICATION_TOKEN must ALSO exist in the Netlify site environment.
          # Setting only the GitHub secret yields a green workflow and a 401
          # from every function.
          SYNDICATION_TOKEN: ${{ secrets.SYNDICATION_TOKEN }}
          NETLIFY_SITE_URL: ${{ secrets.NETLIFY_SITE_URL }}
          DRY_RUN: ${{ github.event.inputs.publish != 'true' }}
        run: python scripts/post-syndication.py

      - name: Record what was posted
        if: github.event.inputs.publish == 'true'
        run: |
          set -euo pipefail
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add -A content/syndication
          if git diff --cached --quiet -- content/syndication; then
            echo "Nothing to record"
          else
            git commit -m "chore(syndication): record posted_at"
            git push
          fi
