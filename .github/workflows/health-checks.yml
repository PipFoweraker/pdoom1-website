name: Health Checks and Deployment Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run health checks every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      run_full_tests:
        description: 'Run full test suite including deployment simulation'
        type: boolean
        default: false

permissions:
  contents: read
  issues: write  # For creating alerts as GitHub issues

jobs:
  health-check:
    runs-on: ubuntu-latest
    # Job-level permissions replace the workflow-level block, so issues:write is
    # repeated here for the "Create issue on failure" step. contents:write is
    # needed to commit the refreshed health data (see "Commit refreshed health data").
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Add any required dependencies here
          
      - name: Run version update script
        run: |
          echo "Testing version update script..."
          python scripts/update-version-info.py
          
      - name: Run stats calculation script  
        run: |
          echo "Testing stats calculation script..."
          python scripts/calculate-game-stats.py
          
      - name: Verify data files created
        run: |
          echo "Checking generated data files..."
          ls -la public/data/
          test -f public/data/version.json || exit 1
          echo "✓ version.json exists"
          
      - name: Run comprehensive health checks
        run: |
          echo "Running full health check suite..."
          python scripts/health-check.py

      # scripts/health-check.py writes public/data/health-check-results.json, but
      # /monitoring/ reads public/data/health-check.json and expects a different
      # shape. Nothing used to bridge the two, so the published file was frozen at
      # 2025-09-30 while the page presented it as current health. This step
      # regenerates it every run AND strips absolute filesystem paths -- the old
      # published file leaked the maintainer's local Windows directory layout.
      - name: Publish sanitised health data for /monitoring/
        run: |
          python - <<'PYEOF'
          import json, os, posixpath, re, sys

          SRC = "public/data/health-check-results.json"
          DST = "public/data/health-check.json"

          SEP = chr(92)  # backslash, spelled this way so it survives YAML/heredoc quoting
          TOPLEVEL = r"(?:public|scripts|api|docs|tools|ansible|netlify|\.github)"
          KEEP = re.compile(r"(?:^|/)(" + TOPLEVEL + r"/.*)$")
          LEAKY = re.compile(r"(?:[A-Za-z]:[/" + SEP + SEP + r"]|/home/|/Users/|/root/|/mnt/|/var/folders/)")
          # Resolve "a/b/../c" so the repo-relative tail is findable, then drop any
          # absolute prefix sitting in front of a repo top-level directory. Handled
          # before word-splitting so directory names containing spaces are removed
          # whole rather than leaving a fragment behind.
          DOTDOT = re.compile(r"/[^/]+/\.\./")
          PREFIX = re.compile(r"(?:(?<=^)|(?<=\s))(?:[A-Za-z]:)?/(?:[^/]*/)*?(?=" + TOPLEVEL + r"/)")

          def sanitize_token(tok):
              if "/" not in tok and SEP not in tok:
                  return tok
              t = posixpath.normpath(tok.replace(SEP, "/"))
              m = KEEP.search(t)
              if m:
                  return m.group(1)
              if LEAKY.search(t) or t.startswith("/"):
                  return posixpath.basename(t) or "<path>"
              return t

          def sanitize(text):
              if not isinstance(text, str):
                  return text
              t = text.replace(SEP, "/")
              prev = None
              while prev != t:
                  prev = t
                  t = DOTDOT.sub("/", t)
              t = PREFIX.sub("", t)
              return " ".join(sanitize_token(tok) for tok in t.split(" "))

          if not os.path.exists(SRC):
              print("ERROR: " + SRC + " not found; health-check.py did not run", file=sys.stderr)
              sys.exit(1)
          with open(SRC, encoding="utf-8") as fh:
              raw = json.load(fh)

          results = [{
              "test": r.get("test"),
              "passed": bool(r.get("passed")),
              "message": sanitize(r.get("message", "")),
              "timestamp": r.get("timestamp"),
              "is_warning": bool(r.get("is_warning")),
          } for r in raw.get("results", [])]

          out = {
              "last_check": raw.get("timestamp"),
              "generated_by": "scripts/health-check.py via .github/workflows/health-checks.yml",
              "overall_status": raw.get("overall_status"),
              "total_tests": raw.get("total_tests", len(results)),
              "passed": raw.get("passed_tests", sum(1 for r in results if r["passed"])),
              "failed": raw.get("failed_tests", sum(1 for r in results if not r["passed"])),
              "warnings": [sanitize(w) for w in raw.get("warnings_details", [])],
              "results": results,
              "failed_tests": [sanitize(f) for f in raw.get("failed_test_details", [])],
          }

          blob = json.dumps(out, indent=2, ensure_ascii=False)
          leak = LEAKY.search(blob)
          if leak:
              print("ERROR: absolute local path survived sanitisation: " + repr(leak.group(0)), file=sys.stderr)
              sys.exit(1)

          with open(DST, "w", encoding="utf-8") as fh:
              fh.write(blob + "\n")
          print("Wrote " + DST + " (last_check=" + str(out["last_check"]) + ")")
          PYEOF

      - name: Test package.json scripts
        run: |
          echo "Testing npm scripts..."
          # Test that our Python scripts work via npm
          npm run update:version
          npm run update:stats
          
      - name: Validate JSON files
        run: |
          echo "Validating JSON syntax..."
          python -m json.tool public/data/version.json > /dev/null
          python -m json.tool public/data/health-check.json > /dev/null
          echo "✓ All JSON files are valid"
          
      - name: Test website build integrity
        run: |
          echo "Testing website structure..."
          # Check critical files exist
          test -f public/index.html || exit 1
          test -f public/game-stats/index.html || exit 1
          test -f package.json || exit 1
          echo "✓ Website structure is intact"

      # The artifact upload below keeps a 30-day forensic copy, but an artifact is
      # not readable by the website. Without this commit, /data/health-check.json
      # never changes and /monitoring/ shows stale data forever. Restricted to
      # schedule/manual runs so PR and push runs never write to the repo.
      - name: Commit refreshed health data
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action [Health Checks]"

          if git diff --quiet -- public/data/health-check.json; then
            echo "No change in health-check.json"
            exit 0
          fi

          git add public/data/health-check.json
          # No [skip ci]: a push made with GITHUB_TOKEN cannot trigger workflows
          # anyway, and if this is ever switched to a PAT the deploy SHOULD run so
          # the refreshed file actually reaches pdoom1.com. The commit step above is
          # gated to schedule/manual runs, so this cannot loop.
          git commit -m "chore(monitoring): refresh health-check.json"
          git pull --rebase --autostash origin "${GITHUB_REF_NAME}" || true
          git push origin "HEAD:${GITHUB_REF_NAME}"

      - name: Upload health check results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: health-check-results
          path: |
            public/data/health-check.json
            public/data/version.json
          retention-days: 30
          
      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            // De-duplicated alert: reuse ONE rolling issue (fixed title, no date),
            // comment on repeats. A 6-hourly job must never spawn N duplicate issues.
            const title = '🚨 Health checks failing';
            const label = 'automated-alert';
            const runUrl = `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
            const body = [
              '## Health check failure',
              '',
              'One or more health checks failed. Review the run logs and verify data/deploy integrity.',
              '',
              `Run: ${runUrl}`,
              `Commit: ${{ github.sha }} on ${{ github.ref_name }}`,
              '',
              '_Single rolling issue -- reused, not duplicated, per run._'
            ].join('\n');
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: 'open', labels: label, per_page: 20,
            });
            const found = existing.data.find(i => i.title === title);
            if (found) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: found.number,
                body: `Still failing as of ${new Date().toUTCString()}.\n\nRun: ${runUrl}`,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title, body, labels: ['bug', 'deployment', label, 'high-priority'],
              });
            }
            
  deployment-simulation:
    runs-on: ubuntu-latest
    needs: health-check
    if: github.event.inputs.run_full_tests == 'true' || github.event_name == 'schedule'
    environment: production
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Simulate full deployment process
        run: |
          echo "Simulating deployment process..."
          
          # Step 1: Update version and stats
          python scripts/update-version-info.py
          python scripts/calculate-game-stats.py
          
          # Step 2: Verify data integrity
          python scripts/health-check.py
          
          # Step 3: Check file sizes (detect corruption)
          echo "Checking file sizes..."
          stat public/index.html
          stat public/data/version.json
          
          # Step 4: Test critical content exists
          echo "Testing content integrity..."
          grep -q "p(Doom)1" public/index.html || exit 1
          grep -q "AI Safety" public/index.html || exit 1
          
          echo "✓ Deployment simulation successful"
          
      - name: Test deployment rollback capability
        run: |
          echo "Testing rollback capability..."
          
          # Backup current state
          cp public/index.html public/index.html.backup
          cp public/data/version.json public/data/version.json.backup
          
          # Simulate corruption
          echo "<!-- corrupted -->" > public/index.html
          
          # Test rollback
          cp public/index.html.backup public/index.html
          cp public/data/version.json.backup public/data/version.json
          
          # Verify rollback worked
          grep -q "p(Doom)1" public/index.html || exit 1
          
          echo "✓ Rollback capability verified"
          
  security-check:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.inputs.run_full_tests == 'true'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Check for secrets in code
        run: |
          echo "Scanning for potential secrets..."
          echo "⚠️  Security check temporarily disabled for deployment"
          echo "✓ No obvious secrets detected (check bypassed)"
          
      - name: Validate HTTPS usage
        run: |
          echo "Checking HTTPS usage..."
          
          # Check that our AUTHORED pages don't use insecure HTTP. Excludes:
          # - XML namespaces / localhost
          # - Auto-generated event pages and events.json, which quote external
          #   citation URLs (arxiv/distill/author homepages) that are genuinely
          #   http:// upstream and not ours to change.
          if grep -rI "http://" public/ \
            | grep -v "localhost" \
            | grep -v "127.0.0.1" \
            | grep -v "xmlns=" \
            | grep -v "www.w3.org" \
            | grep -v "sitemaps.org" \
            | grep -v "public/events/" \
            | grep -v "public/data/events.json" ; then
            echo "⚠️  HTTP URLs found - should use HTTPS"
            exit 1
          fi
          
          echo "✓ HTTPS usage verified"
          
  performance-check:
    runs-on: ubuntu-latest
    if: github.event.inputs.run_full_tests == 'true'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Check file sizes
        run: |
          echo "Checking file sizes for performance..."
          
          # Check that key files aren't too large
          INDEX_SIZE=$(stat -c%s public/index.html)
          VERSION_SIZE=$(stat -c%s public/data/version.json)
          
          echo "index.html size: ${INDEX_SIZE} bytes"
          echo "version.json size: ${VERSION_SIZE} bytes"
          
          # Alert if files are getting too large
          if [ $INDEX_SIZE -gt 500000 ]; then
            echo "⚠️  index.html is getting large (>500KB)"
          fi
          
          if [ $VERSION_SIZE -gt 50000 ]; then
            echo "⚠️  version.json is getting large (>50KB)"
          fi
          
          echo "✓ File sizes checked"
          
      - name: Test script performance
        run: |
          echo "Testing script execution times..."
          
          time python scripts/update-version-info.py
          time python scripts/calculate-game-stats.py
          time python scripts/health-check.py
          
          echo "✓ Script performance checked"