name: Sync Airtable to JSON

# SCHEDULE REMOVED 2026-07-22. This ran every 6 hours and failed 1,264 times
# consecutively -- it has never once succeeded. The run log prints the env block
# with `AIRTABLE_API_KEY:` blank: the four AIRTABLE_* secrets were never set, and
# there is no Airtable base behind this. Four red X's a day for an integration
# that does not exist is the alert-fatigue generator that will mask a real
# failure during the alpha.
#
# Note also that scripts/sync_airtable.py syncs BLOG/CHANGELOG rows, not
# contributor data -- the "Contributor CRM" framing in issue #70 is aspirational.
# Delete this workflow and the script unless an Airtable base actually appears.
on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Run sync script
        env:
          AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
          AIRTABLE_BLOG_TABLE: ${{ secrets.AIRTABLE_BLOG_TABLE }}
          AIRTABLE_CHANGELOG_TABLE: ${{ secrets.AIRTABLE_CHANGELOG_TABLE }}
        run: |
          python scripts/sync_airtable.py
      - name: Commit changes
        run: |
          if git diff --quiet public/data; then
            echo "No changes"
          else
            git config user.name "github-actions"
            git config user.email "actions@github.com"
            git add public/data/*.json
            git commit -m "chore(data): sync Airtable to JSON"
            git push
          fi
